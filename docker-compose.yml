name: eduquest

x-app-service: &app-service
  build:
    context: .
    dockerfile: Dockerfile
    network: host
  image: eduquest-dev
  volumes:
    - type: bind
      source: .
      target: /workspace
    - type: volume
      source: node_modules
      target: /workspace/node_modules
    - type: volume
      source: wrangler_state
      target: /workspace/apps/backend/.wrangler

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: eduquest
      POSTGRES_USER: eduquest
      POSTGRES_PASSWORD: eduquest
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    <<: *app-service
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_ENV: development
      ENABLE_DEBUG_AUTH: "true"
      FRONTEND_URL: http://localhost:5173
      JWT_SECRET: replace-with-a-local-development-secret
      DATABASE_URL: postgresql://eduquest:eduquest@postgres:5432/eduquest
      GITHUB_REDIRECT_URI: http://localhost:8787/api/auth/github/callback
      CHOKIDAR_USEPOLLING: "true"
      WRANGLER_SEND_METRICS: "false"
    command: >
      sh -c 'npm run dev --workspace backend -- --ip 0.0.0.0 --port 8787
      --var APP_ENV:$$APP_ENV
      --var ENABLE_DEBUG_AUTH:$$ENABLE_DEBUG_AUTH
      --var FRONTEND_URL:$$FRONTEND_URL
      --var JWT_SECRET:$$JWT_SECRET
      --var DATABASE_URL:$$DATABASE_URL
      --var GITHUB_REDIRECT_URI:$$GITHUB_REDIRECT_URI'
    ports:
      - "8787:8787"

  frontend:
    <<: *app-service
    depends_on:
      backend:
        condition: service_started
    environment:
      VITE_APP_ENV: development
      VITE_BACKEND_BASE_URL: http://localhost:8787
      VITE_ENABLE_DEV_TOOLS: "true"
      CHOKIDAR_USEPOLLING: "true"
    command: npm run dev --workspace frontend -- --host 0.0.0.0 --port 5173
    ports:
      - "5173:5173"

volumes:
  node_modules:
  postgres_data:
  wrangler_state:
